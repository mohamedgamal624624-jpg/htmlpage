name: jj
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط المصدر m3u8'
        required: true
      duration_minutes:
        description: 'المدة بالدقائق'
        required: true
        default: '10'

jobs:
  relay-to-vk:
    runs-on: ubuntu-latest
    timeout-minutes: 1500
    steps:
      - name: تثبيت ffmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: نقل البث (copy مع تصليح كامل)
        env:
          RTMP_BASE: ${{ secrets.VK_RTMP_URL }}
          STREAM_KEY: ${{ secrets.VK_STREAM_KEY }}
        run: |
          MINUTES="${{ inputs.duration_minutes }}"
          DURATION_SECONDS=$(( MINUTES * 60 ))

          echo "=== DEBUG INFO ==="
          echo "RTMP_BASE length: ${#RTMP_BASE} chars (يجب أن يكون >0)"
          echo "STREAM_KEY length: ${#STREAM_KEY} chars (يجب أن يكون >10)"
          if [ -z "$RTMP_BASE" ] || [ -z "$STREAM_KEY" ]; then
            echo "خطأ كبير: الـ secrets فارغة! أعد إضافتها في Settings → Secrets and variables → Actions."
            exit 1
          fi

          TARGET="${RTMP_BASE}/${STREAM_KEY}"
          # لو الاتصال فشل بعد ده، جرب غيّر TARGET لـ واحد من دول (علّق اللي فوق):
          # TARGET="$RTMP_BASE"                           # لو الكي مدمج في الـ URL
          # TARGET="${RTMP_BASE}/live/${STREAM_KEY}"
          # TARGET="rtmps://${RTMP_BASE#rtmp://}/${STREAM_KEY}"  # لو الـ URL rtmp ويحتاج rtmps

          SOURCE="${{ inputs.source_url }}"

          echo "المصدر: $SOURCE"
          echo "الـ RTMP target الكامل: $TARGET"
          echo "المدة: $MINUTES دقيقة ($DURATION_SECONDS ثانية)"
          echo "==================="

          ffmpeg \
            -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
            -re \
            -probesize 10M -analyzeduration 10M \
            -i "$SOURCE" \
            -c copy \
            -f flv \
            -t "$DURATION_SECONDS" \
            "$TARGET" 2> ffmpeg_relay.log || true

          echo "انتهى النقل."
          echo "=== آخر 70 سطر من الـ log (مهم للتصحيح):"
          tail -n 70 ffmpeg_relay.log
          echo "==================="
