name: jjj

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط المصدر m3u8'
        required: true
      duration_minutes:
        description: 'المدة بالدقائق'
        required: true
        default: '10'

jobs:
  relay-to-vk:
    runs-on: ubuntu-latest
    timeout-minutes: 1500
    steps:
      - name: تثبيت ffmpeg
        run: sudo apt update && sudo apt install -y ffmpeg

      - name: نقل البث (copy مع تصليح)
        env:
          RTMP_BASE: ${{ secrets.VK_RTMP_URL }}
          STREAM_KEY: ${{ secrets.VK_STREAM_KEY }}
        run: |
          MINUTES="${{ inputs.duration_minutes }}"
          DURATION_SECONDS=$(( MINUTES * 60 ))

          echo "=== DEBUG START ==="
          echo "RTMP_BASE length: ${#RTMP_BASE} chars"
          echo "STREAM_KEY length: ${#STREAM_KEY} chars"
          if [ -z "$RTMP_BASE" ] || [ -z "$STREAM_KEY" ]; then
            echo "ERROR: واحد أو الاتنين secrets فارغين! أعد إضافتهم في Settings → Secrets."
            exit 1
          fi

          TARGET="${RTMP_BASE}/${STREAM_KEY}"
          # لو الـ key مش بيتركب كده، جرب غيّر TARGET لـ واحد من دول:
          # TARGET="$RTMP_BASE"
          # TARGET="${RTMP_BASE}/input/${STREAM_KEY}"
          # TARGET="rtmps://${RTMP_BASE#rtmp://}/${STREAM_KEY}"

          SOURCE="${{ inputs.source_url }}"

          echo "Source: $SOURCE"
          echo "Target (full RTMP): $TARGET"
          echo "Duration: $MINUTES min ($DURATION_SECONDS sec)"
          echo "==================="

          ffmpeg \
            -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
            -re \                          # هنا قبل -i
            -i "$SOURCE" \
            -c copy \
            -f flv \
            -t "$DURATION_SECONDS" \
            "$TARGET" 2> ffmpeg.log || true

          echo "انتهى. Log الأخير (60 سطر):"
          tail -n 60 ffmpeg.log
          echo "=== DEBUG END ==="
