name: kkkk
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط المصدر (m3u8 أو HLS أو أي بث مباشر)'
        required: true
      duration_minutes:
        description: 'مدة النقل بالدقائق (5–1440)'
        required: true
        default: '10'

jobs:
  relay-to-vk:
    runs-on: ubuntu-latest
    timeout-minutes: 1500
    steps:
      - name: تثبيت ffmpeg
        run: |
          sudo apt update && sudo apt install -y ffmpeg

      - name: نقل البث (copy فقط)
        run: |
          MINUTES="${{ inputs.duration_minutes }}"
          DURATION_SECONDS=$(( MINUTES * 60 ))

          # ← غيّر هنا الـ RTMP URL والـ Stream Key الثابتين بتوعك
          RTMP_BASE="rtmp://vsu.mycdn.me/input/"          # ← غيّر ده للـ URL الحقيقي من VK
          STREAM_KEY="1125899946318803_1125899946318803_71_v44fib4mhe"     # ← غيّر ده للـ key الطويل كامل

          TARGET="${RTMP_BASE}/${STREAM_KEY}"

          SOURCE="${{ inputs.source_url }}"

          echo "جاري نقل البث من:"
          echo "  → $SOURCE"
          echo "إلى:"
          echo "  → $TARGET"
          echo "المدة: $MINUTES دقيقة ($DURATION_SECONDS ثانية)"

          ffmpeg \
            -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
            -re \
            -i "$SOURCE" \
            -c copy \
            -f flv \
            -t "$DURATION_SECONDS" \
            "$TARGET" 2> ffmpeg.log || true

          echo ""
          echo "انتهى النقل."
          echo "آخر 60 سطر من الـ log (لو فيه خطأ):"
          tail -n 60 ffmpeg.log
