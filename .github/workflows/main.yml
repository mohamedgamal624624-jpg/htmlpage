name: نقل بث مباشر إلى VK (copy فيديو + AAC صوت - بدون secrets)

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'رابط المصدر (m3u8 أو HLS أو أي بث مباشر)'
        required: true
      duration_minutes:
        description: 'مدة النقل بالدقائق (5–1440)'
        required: true
        default: '10'

jobs:
  relay-to-vk:
    runs-on: ubuntu-latest
    timeout-minutes: 1500
    steps:
      - name: تثبيت ffmpeg
        run: |
          sudo apt update && sudo apt install -y ffmpeg

      - name: نقل البث إلى VK
        run: |
          MINUTES="${{ inputs.duration_minutes }}"
          DURATION_SECONDS=$(( MINUTES * 60 ))

          # ────────────────────────────────────────────────
          # غيّر هنا القيمتين الثابتتين بتوعك من VK
          RTMP_BASE="rtmp://vsu.mycdn.me/input"             # ← الـ Server URL من VK (بدون / في النهاية)
          STREAM_KEY="1125899946318803_1125899946318803_71_v44fib4mhe"   # ← الـ Stream Key كامل
          # ────────────────────────────────────────────────

          # TARGET بدون double slash
          if [[ "$RTMP_BASE" == */ ]]; then
            TARGET="${RTMP_BASE}${STREAM_KEY}"
          else
            TARGET="${RTMP_BASE}/${STREAM_KEY}"
          fi

          SOURCE="${{ inputs.source_url }}"

          echo "جاري نقل البث من:"
          echo "  → $SOURCE"
          echo "إلى:"
          echo "  → $TARGET"
          echo "المدة: $MINUTES دقيقة ($DURATION_SECONDS ثانية)"
          echo ""

          ffmpeg \
            -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
            -re \
            -i "$SOURCE" \
            -c:v copy \
            -c:a aac -b:a 128k -ar 48000 -ac 2 \
            -f flv \
            -t "$DURATION_SECONDS" \
            "$TARGET" 2> ffmpeg.log || true

          echo ""
          echo "───────────────────────────────────────────────"
          echo "انتهى النقل. آخر 80 سطر من الـ log:"
          tail -n 80 ffmpeg.log
          echo "───────────────────────────────────────────────"
